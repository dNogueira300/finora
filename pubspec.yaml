name: finora
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1 # se mantiene en 2.x a proposito: 3.x renombra APIs y 2.x sigue mantenida
  go_router: ^17.3.0
  supabase_flutter: ^2.16.0
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  local_auth: ^3.0.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  fl_chart: ^1.2.0
  connectivity_plus: ^7.3.0
  google_fonts: ^8.2.0
  uuid: ^4.6.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.34.4
  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  image: ^4.9.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/brand/

# Configuracion de flutter_launcher_icons: genera el icono de la app en Android
# a partir del logo de marca. Solo se apunta a Android; iOS/web/windows no se tocan.
flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: false
  windows:
    generate: false
  image_path: assets/brand/logo.png
  min_sdk_android: 23
  adaptive_icon_background: "#16A34A"
  # Foreground con padding (lienzo 1024x1024, logo a 640px centrado) para que
  # el recorte ~33% de la mascara adaptativa no corte el logo. Generado con
  # tool/make_padded_icon.dart a partir de assets/brand/logo.png.
  adaptive_icon_foreground: "assets/icon/icon_padded.png"

# Configuracion de flutter_native_splash: splash screen nativo con fondo verde
# de marca y un icono circular (plato blanco + logo) centrado, mostrado
# mientras Flutter inicializa. El icono es assets/icon/splash_icon.png,
# generado con tool/make_splash_icon.dart a partir de assets/brand/logo.png:
# un circulo blanco solido con el logo encima, para que la mascara circular
# de Android 12+ nunca corte los bordes duros del logo cuadrado.
flutter_native_splash:
  color: "#16A34A"
  image: "assets/icon/splash_icon.png"
  # Solo Android: el proyecto no mantiene el target iOS activo (ver
  # flutter_launcher_icons.ios: false) y no se quiere tocar ios/Runner.
  ios: false
  android_12:
    color: "#16A34A"
    image: "assets/icon/splash_icon.png"
